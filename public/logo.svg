<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#161B22"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#purpleGradient)" stroke-width="4" opacity="0.3"/>

  <!-- Magnifying glass lens -->
  <circle cx="220" cy="220" r="120" fill="none" stroke="url(#purpleGradient)" stroke-width="16" filter="url(#glow)"/>

  <!-- Inner scanning circle -->
  <circle cx="220" cy="220" r="80" fill="none" stroke="url(#glowGradient)" stroke-width="3" stroke-dasharray="20 10" opacity="0.6"/>

  <!-- Scan lines inside lens -->
  <g opacity="0.4" stroke="url(#purpleGradient)" stroke-width="2">
    <line x1="140" y1="180" x2="300" y2="180"/>
    <line x1="140" y1="220" x2="300" y2="220"/>
    <line x1="140" y1="260" x2="300" y2="260"/>
  </g>

  <!-- AI detection eye/target in center -->
  <circle cx="220" cy="220" r="30" fill="none" stroke="url(#purpleGradient)" stroke-width="4"/>
  <circle cx="220" cy="220" r="12" fill="url(#purpleGradient)"/>

  <!-- Magnifying glass handle -->
  <rect x="310" y="310" width="100" height="28" rx="14" fill="url(#purpleGradient)" transform="rotate(45 360 324)" filter="url(#glow)"/>

  <!-- Circuit nodes -->
  <g fill="url(#glowGradient)">
    <circle cx="160" cy="150" r="6"/>
    <circle cx="280" cy="150" r="6"/>
    <circle cx="160" cy="290" r="6"/>
    <circle cx="280" cy="290" r="6"/>
  </g>

  <!-- Circuit lines -->
  <g stroke="url(#glowGradient)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M160 150 L130 150 L130 120"/>
    <path d="M280 150 L310 150 L310 120"/>
    <path d="M160 290 L130 290 L130 320"/>
  </g>

  <!-- Checkmark accent -->
  <path d="M380 180 L400 200 L440 140" fill="none" stroke="#10B981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
