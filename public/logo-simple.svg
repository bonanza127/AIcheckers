<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main shield shape -->
  <path d="M256 40 L440 120 L440 280 C440 380 340 460 256 480 C172 460 72 380 72 280 L72 120 Z"
        fill="#161B22" stroke="url(#grad)" stroke-width="8"/>

  <!-- AI letters stylized -->
  <text x="256" y="240" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="140" font-weight="900" fill="url(#grad)" filter="url(#glow)">AI</text>

  <!-- Scanning line -->
  <line x1="120" y1="300" x2="392" y2="300" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

  <!-- Checkmark -->
  <path d="M180 340 L230 390 L340 260" fill="none" stroke="#10B981" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
